<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body{
            background:linear-gradient(135deg,#4a000d 0%,#800020 100%);
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0;
            padding:30px 0;
        }

        .auth-card{
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,0.3);
            width:100%;
            max-width:650px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
            border:1px solid #e5e7eb;
        }

        .form-control:focus{
            border-color:#800020;
            box-shadow:0 0 0 4px rgba(128,0,32,0.15);
        }

        .btn-primary{
            background:#800020;
            border:none;
            border-radius:12px;
            padding:14px;
            font-weight:600;
        }

        .btn-primary:hover{
            background:#5c0017;
        }

        .profile-preview{
            width:160px;
            height:160px;
            border-radius:12px;
            object-fit:cover;
            border:4px solid #800020;
            display:none;
            margin:auto;
        }

    </style>
</head>
<body>

<div class="auth-card">

    <h3 class="fw-bold text-center mb-1" style="color:#800020;">
        Create Account
    </h3>

    <p class="text-muted text-center mb-4">
        Fill in your personal information
    </p>

    <div id="statusMsg" class="alert d-none"></div>

    <form id="registerForm">

        <div class="text-center mb-4">
            <img id="previewImage" class="profile-preview">
        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Full Name
                </label>

                <input type="text" id="fullname" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Username
                </label>

                <input type="text" id="username" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Password
                </label>

                <input type="password" id="password" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Email
                </label>

                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Phone Number
                </label>

                <input type="text" id="phone" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Birthday
                </label>

                <input type="date" id="birthday" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Gender
                </label>

                <select id="gender" class="form-control" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Prefer not to say</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Address
                </label>

                <input type="text" id="address" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    School Graduated
                </label>

                <input type="text" id="school" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Graduation Year
                </label>

                <input type="number" id="graduationYear" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Course
                </label>

                <input type="text" id="course" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    Occupation
                </label>

                <input type="text" id="occupation" class="form-control">
            </div>

            <div class="col-12 mb-3">
                <label class="small fw-bold text-uppercase text-muted">
                    About Me
                </label>

                <textarea id="bio" rows="3" class="form-control"></textarea>
            </div>

            <div class="col-12 mb-4">
                <label class="small fw-bold text-uppercase text-muted">
                    2x2 Profile Picture
                </label>

                <input type="file"
                       id="profile_pic"
                       class="form-control"
                       accept="image/*"
                       required>

                <small class="text-muted">
                    Maximum file size: 2MB
                </small>
            </div>

        </div>

        <button type="submit" class="btn btn-primary w-100">
            Register Account
        </button>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none" style="color:#800020;">
                Already have an account? Sign In
            </a>
        </div>

    </form>

</div>

<script>

const imageInput = document.getElementById('profile_pic');
const previewImage = document.getElementById('previewImage');

imageInput.addEventListener('change', function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){
            previewImage.src = e.target.result;
            previewImage.style.display = 'block';
        }

        reader.readAsDataURL(file);
    }

});

document.getElementById('registerForm').addEventListener('submit', function(e){

    e.preventDefault();

    const fullname = document.getElementById('fullname').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const birthday = document.getElementById('birthday').value;
    const gender = document.getElementById('gender').value;
    const address = document.getElementById('address').value;
    const school = document.getElementById('school').value;
    const graduationYear = document.getElementById('graduationYear').value;
    const course = document.getElementById('course').value;
    const occupation = document.getElementById('occupation').value;
    const bio = document.getElementById('bio').value;

    const file = imageInput.files[0];

    const statusMsg = document.getElementById('statusMsg');

    if(file.size > 2 * 1024 * 1024){

        statusMsg.className = 'alert alert-danger';
        statusMsg.innerHTML = 'Image too large.';

        return;
    }

    const reader = new FileReader();

    reader.onload = function(event){

        const userData = {

            fullname,
            username,
            password,
            email,
            phone,
            birthday,
            gender,
            address,
            school,
            graduationYear,
            course,
            occupation,
            bio,
            profilePic:event.target.result

        };

        localStorage.setItem(
            'user_' + username,
            JSON.stringify(userData)
        );

        statusMsg.className = 'alert alert-success';

        statusMsg.innerHTML =
        "Registration successful! <a href='login.html'>Login here</a>";

        document.getElementById('registerForm').reset();

        previewImage.style.display = 'none';

    }

    reader.readAsDataURL(file);

});

</script>

</body>
</html>
