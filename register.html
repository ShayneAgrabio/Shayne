<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Welcome!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4a000d 0%, #800020 100%); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; 
        }
        .custom-card { border: none; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); background: #ffffff; width: 100%; max-width: 500px; padding: 3rem; margin: 2rem 1rem; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e2e8f0; background: #f8f9fa; }
        .form-control:focus { border-color: #800020; box-shadow: 0 0 0 4px rgba(128, 0, 32, 0.15); background-color: #ffffff !important; }
        .btn-register { background: #800020; color: #fff; border: none; border-radius: 10px; padding: 14px; font-weight: 600; width: 100%; transition: all 0.3s; }
        .btn-register:hover { background: #5c0017; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); color: #fff; }
        .text-maroon { color: #800020; font-weight: 700; }
    </style>
</head>
<body>

<div class="custom-card">
    <h3 class="text-center mb-4 fw-bold text-maroon">Create Account</h3>

    <div id="statusMsg" class="alert rounded-3 text-center" style="display:none; font-size: 0.95rem;"></div>

    <form id="registerForm">
        <div class="mb-3">
            <label class="form-label text-muted fw-semibold small text-uppercase">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted fw-semibold small text-uppercase">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted fw-semibold small text-uppercase">Address</label>
            <input type="text" id="address" class="form-control" placeholder="Enter your full address" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-muted fw-semibold small text-uppercase">Profile Picture</label>
            <input type="file" id="profile_pic" class="form-control" accept="image/*" required>
            <small class="text-muted" style="font-size: 0.75rem;">(Maximum size: 5MB)</small>
        </div>
        <button type="submit" class="btn btn-register mt-2">Register Account</button>
        <div class="mt-4 text-center">
            <small class="text-muted">Already have an account? <a href="login.html" class="text-maroon text-decoration-none">Log in</a></small>
        </div>
    </form>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const address = document.getElementById('address').value;
        const fileInput = document.getElementById('profile_pic');
        const statusMsgDiv = document.getElementById('statusMsg');

        statusMsgDiv.style.display = 'none';
        statusMsgDiv.className = 'alert rounded-3 text-center';

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];

            if (file.size > 5 * 1024 * 1024) {
                statusMsgDiv.innerHTML = "<b>Error:</b> Image is too large! Please choose a picture under 5MB.";
                statusMsgDiv.classList.add('alert-danger');
                statusMsgDiv.style.display = 'block';
                return; 
            }

            const reader = new FileReader();

            reader.onload = function(event) {
                const base64Image = event.target.result;
                const userAccount = { username, password, address, profilePic: base64Image };

                try {
                    localStorage.setItem('user_' + username, JSON.stringify(userAccount));
                    statusMsgDiv.innerHTML = "Success! <a href='login.html' class='alert-link text-maroon'>Log in here</a>";
                    statusMsgDiv.classList.add('alert-success');
                    statusMsgDiv.style.display = 'block';
                    document.getElementById('registerForm').reset();
                } catch (error) {
                    statusMsgDiv.innerHTML = "<b>Error:</b> Browser storage full. Please try a slightly smaller image.";
                    statusMsgDiv.classList.add('alert-danger');
                    statusMsgDiv.style.display = 'block';
                }
            };
            reader.readAsDataURL(file);
        }
    });
</script>
</body>
</html>
