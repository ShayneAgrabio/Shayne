<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fdfafb; color: #333; }
        
        /* FULL MAROON HEADER OVERLAY */
        .dashboard-header { background: linear-gradient(135deg, #4a000d 0%, #800020 100%); height: 300px; width: 100%; position: absolute; top: 0; z-index: -1; }
        
        .dashboard-container { margin-top: 120px; max-width: 650px; }
        .dashboard-card { border: none; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); background: #ffffff; padding: 3rem; margin: 0 1rem; }
        
        .profile-container { margin-top: -120px; margin-bottom: 20px; display: flex; justify-content: center; position: relative; }
        
        /* NO BACKGROUND COLOR SO NO CIRCLE SHOWS BENEATH */
        .profile-pic { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 6px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.15); background: transparent; }
        
        /* Placeholder styling */
        .placeholder-circle { width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #800020; border: 6px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        
        .info-box { background: #fcf5f6; border-left: 5px solid #800020; border-radius: 12px; }
        
        .btn-logout { background-color: #fff; color: #800020; border: 2px solid #800020; padding: 12px 35px; border-radius: 10px; font-weight: 600; transition: all 0.3s; text-decoration: none; cursor: pointer; display: block; width: 100%; text-align: center; }
        .btn-logout:hover { background: #800020; color: #fff; box-shadow: 0 8px 20px rgba(128, 0, 32, 0.2); }
        .text-maroon { color: #800020; }
    </style>
</head>
<body>

<div class="dashboard-header"></div>

<div class="container d-flex justify-content-center">
    <div class="dashboard-container w-100">
        <div class="dashboard-card text-center">
            
            <div class="profile-container" id="profileWrapper">
                <img id="profileImage" src="" alt="Profile Picture" class="profile-pic" style="display: none;">
                
                <div id="noImagePlaceholder" class="placeholder-circle">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <h2 class="fw-bold mb-1 text-maroon" id="mainUsername">...</h2>
            <p class="text-muted mb-4 small fw-bold text-uppercase" style="letter-spacing: 1px;">Member</p>
            
            <div class="text-start p-4 mb-4 info-box mt-4">
                <h6 class="fw-bold mb-4 text-maroon">ACCOUNT INFORMATION</h6>
                <div class="row g-3">
                    <div class="col-6">
                        <p class="mb-1 text-muted small fw-semibold text-uppercase">Username</p>
                        <p class="mb-0 fw-medium fs-5" id="infoUsername">...</p>
                    </div>
                    <div class="col-6">
                        <p class="mb-1 text-muted small fw-semibold text-uppercase">Address</p>
                        <p class="mb-0 fw-medium fs-5" id="infoAddress">...</p>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a onclick="logout()" class="btn-logout">Sign Out</a>
            </div>
        </div>
    </div>
</div>

<script>
    const loggedInUser = sessionStorage.getItem('loggedInUser');

    if (!loggedInUser) {
        window.location.href = 'login.html';
    } else {
        const savedUserString = localStorage.getItem('user_' + loggedInUser);
        if (savedUserString) {
            const userData = JSON.parse(savedUserString);
            
            document.getElementById('mainUsername').textContent = userData.username;
            document.getElementById('infoUsername').textContent = userData.username;
            document.getElementById('infoAddress').textContent = userData.address;

            if (userData.profilePic) {
                document.getElementById('profileImage').src = userData.profilePic;
                document.getElementById('profileImage').style.display = 'inline-block';
                
                const placeholder = document.getElementById('noImagePlaceholder');
                if(placeholder) {
                    placeholder.remove();
                }
            }
        }
    }

    function logout() {
        sessionStorage.removeItem('loggedInUser');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
