<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfafb; color: #333; }
        
        .dashboard-header { background: #800020; height: 200px; width: 100%; position: absolute; top: 0; z-index: -1; }
        .dashboard-navbar { background: transparent; }
        
        .dashboard-container { margin-top: 80px; max-width: 650px; }
        .dashboard-card { border: none; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); background: #ffffff; padding: 3rem; }
        
        /* Fixed Profile CSS */
        .profile-container { margin-top: -90px; margin-bottom: 20px; display: flex; justify-content: center; }
        .profile-pic { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 6px solid #fff; box-shadow: 0 8px 20px rgba(128, 0, 32, 0.15); background-color: #f8f9fa; }
        .placeholder-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #800020; border: 6px solid #fff; box-shadow: 0 8px 20px rgba(128, 0, 32, 0.15); }
        
        .info-box { background: #fff5f7; border-left: 4px solid #800020; border-radius: 12px; }
        
        .btn-logout { background-color: #fff; color: #800020; border: 2px solid #e2e8f0; padding: 10px 30px; border-radius: 10px; font-weight: 600; transition: all 0.3s; text-decoration: none; cursor: pointer; }
        .btn-logout:hover { border-color: #800020; color: #800020; background: #fff5f7; }
    </style>
</head>
<body>

<div class="dashboard-header"></div>

<nav class="navbar navbar-dark dashboard-navbar pt-4 px-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-4" href="#">MyApplication</a>
    </div>
</nav>

<div class="container d-flex justify-content-center">
    <div class="dashboard-container w-100">
        <div class="dashboard-card text-center">
            
            <div class="profile-container">
                <img id="profileImage" src="" alt="Profile Picture" class="profile-pic" style="display: none;">
                
                <div id="noImagePlaceholder" class="placeholder-circle">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <h2 class="fw-bold mb-1" style="color: #4a000d;" id="mainUsername">...</h2>
            <p class="text-muted mb-4 small fw-semibold text-uppercase">Verified User</p>
            
            <div class="text-start p-4 mb-4 info-box mt-4">
                <h6 class="fw-bold mb-3" style="color: #800020;">ACCOUNT DETAILS</h6>
                <div class="row g-3">
                    <div class="col-6">
                        <p class="mb-1 text-muted small fw-semibold text-uppercase">Username</p>
                        <p class="mb-0 fw-medium" id="infoUsername">...</p>
                    </div>
                    <div class="col-6">
                        <p class="mb-1 text-muted small fw-semibold text-uppercase">Address</p>
                        <p class="mb-0 fw-medium" id="infoAddress">...</p>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a onclick="logout()" class="btn-logout">Sign Out</a>
            </div>
        </div>
    </div>
</div>

<script>
    const loggedInUser = sessionStorage.getItem('loggedInUser');

    if (!loggedInUser) {
        window.location.href = 'login.html';
    } else {
        const savedUserString = localStorage.getItem('user_' + loggedInUser);
        if (savedUserString) {
            const userData = JSON.parse(savedUserString);
            
            document.getElementById('mainUsername').textContent = userData.username;
            document.getElementById('infoUsername').textContent = userData.username;
            document.getElementById('infoAddress').textContent = userData.address;

            // Strict hide/show logic to prevent circle overlapping
            if (userData.profilePic) {
                document.getElementById('profileImage').src = userData.profilePic;
                document.getElementById('profileImage').style.display = 'block';
                document.getElementById('noImagePlaceholder').style.display = 'none';
            }
        }
    }

    function logout() {
        sessionStorage.removeItem('loggedInUser');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
