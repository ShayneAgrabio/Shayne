<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | MyApplication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; }
        .landing-body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .custom-card { border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); padding: 3rem; text-align: center; width: 100%; }
        .btn-custom { border: none; border-radius: 10px; padding: 12px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); text-decoration: none; display: block; width: 100%; }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #5a6edb 100%); color: #fff; margin-bottom: 15px; }
        .btn-login:hover { background: linear-gradient(135deg, #5a6edb 0%, #4e60c4 100%); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); color: #fff; }
        .btn-register { background: linear-gradient(135deg, #764ba2 0%, #683b96 100%); color: #fff; }
        .btn-register:hover { background: linear-gradient(135deg, #683b96 0%, #5a3085 100%); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4); color: #fff; }
    </style>
</head>
<body class="landing-body">

<div class="container d-flex justify-content-center px-3">
    <div style="max-width: 450px; width: 100%;">
        <div class="custom-card">
            <h1 class="fw-bold mb-3" style="color: #4a4a4a;">Welcome!</h1>
            <p class="text-muted mb-5">Join our platform to access your personal dashboard and manage your account.</p>
            
            <a href="login.html" class="btn btn-custom btn-login">Login to Account</a>
            <a href="register.html" class="btn btn-custom btn-register">Create New Account</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
