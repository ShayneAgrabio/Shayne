\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrabio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4a000d 0%, #800020 100%); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; 
        }
        .custom-card { 
            border: none; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
            background: #ffffff; padding: 4rem 3rem; text-align: center; width: 100%; max-width: 450px; 
            margin: 1rem;
        }
        .brand-text { color: #800020; font-weight: 700; letter-spacing: -1px; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .btn-custom { border: none; border-radius: 12px; padding: 14px; font-weight: 600; transition: all 0.3s ease; text-decoration: none; display: block; width: 100%; }
        .btn-login { background: #800020; color: #fff; margin-bottom: 15px; }
        .btn-login:hover { background: #5c0017; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(128, 0, 32, 0.4); color: #fff; }
        .btn-register { background: #fff; color: #800020; border: 2px solid #800020; }
        .btn-register:hover { background: #800020; color: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="custom-card">
        <h1 class="brand-text">Welcome!</h1>
        <p class="text-muted mb-5">Join our platform to access your personal dashboard and manage your account.</p>
        
        <a href="login.html" class="btn btn-custom btn-login">Sign In</a>
        <a href="register.html" class="btn btn-custom btn-register">Create Account</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
