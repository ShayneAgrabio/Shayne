<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4a000d 0%, #800020 100%); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; 
        }
        .custom-card { border: none; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); background: #ffffff; width: 100%; max-width: 450px; padding: 3rem; margin: 2rem 1rem; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e2e8f0; background: #f8f9fa; }
        .form-control:focus { border-color: #800020; box-shadow: 0 0 0 4px rgba(128, 0, 32, 0.15); background-color: #ffffff !important; }
        .btn-login { background: #800020; color: #fff; border: none; border-radius: 10px; padding: 14px; font-weight: 600; width: 100%; transition: all 0.3s; }
        .btn-login:hover { background: #5c0017; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); color: #fff; }
        .text-maroon { color: #800020; font-weight: 700; }
    </style>
</head>
<body>

<div class="custom-card">
    <h3 class="text-center mb-1 fw-bold text-maroon">Welcome Back</h3>
    <p class="text-muted text-center mb-4 small">Sign in to your account</p>

    <div id="errorMsg" class="alert alert-danger text-center rounded-3 p-2 small" style="display:none;"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label text-muted fw-semibold small text-uppercase">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-muted fw-semibold small text-uppercase">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-login mt-2">Sign In</button>
        <div class="mt-4 text-center">
            <small class="text-muted">Don't have an account? <a href="register.html" class="text-maroon text-decoration-none">Sign up</a></small>
        </div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsgDiv = document.getElementById('errorMsg');

        const savedUserString = localStorage.getItem('user_' + username);

        if (savedUserString) {
            const savedUser = JSON.parse(savedUserString);
            if (savedUser.password === password) {
                sessionStorage.setItem('loggedInUser', username);
                window.location.href = 'dashboard.html';
            } else {
                errorMsgDiv.textContent = "Invalid password.";
                errorMsgDiv.style.display = 'block';
            }
        } else {
            errorMsgDiv.textContent = "Account not found.";
            errorMsgDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
