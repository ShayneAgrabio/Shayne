<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
        .auth-body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .custom-card { border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e1e5eb; transition: all 0.3s ease; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15); background-color: #ffffff !important; }
        .btn-custom { border: none; border-radius: 10px; padding: 12px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #5a6edb 100%); color: #fff; }
        .btn-login:hover { background: linear-gradient(135deg, #5a6edb 0%, #4e60c4 100%); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); color: #fff; }
    </style>
</head>
<body class="auth-body">

<div class="container d-flex justify-content-center">
    <div class="w-100" style="max-width: 450px;">
        <div class="custom-card p-5">
            <h2 class="text-center mb-4 fw-bold" style="color: #4a4a4a;">Welcome Back</h2>

            <div id="errorMsg" class="alert alert-danger text-center rounded-3" style="display:none;"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted fw-semibold">Username</label>
                    <input type="text" id="username" class="form-control bg-light" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control bg-light" placeholder="Enter password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-custom btn-login">Login</button>
                </div>
                <div class="mt-4 text-center">
                    <small class="text-muted">Don't have an account? <a href="register.html" style="color: #667eea; font-weight: 600; text-decoration: none;">Register here</a></small>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsgDiv = document.getElementById('errorMsg');

        const savedUserString = localStorage.getItem('user_' + username);

        if (savedUserString) {
            const savedUser = JSON.parse(savedUserString);
            if (savedUser.password === password) {
                sessionStorage.setItem('loggedInUser', username);
                window.location.href = 'dashboard.html';
            } else {
                errorMsgDiv.textContent = "Invalid password.";
                errorMsgDiv.style.display = 'block';
            }
        } else {
            errorMsgDiv.textContent = "No account found with that username.";
            errorMsgDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
