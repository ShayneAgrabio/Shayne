<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#4a000d 0%,#800020 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0;
        }

        .custom-card{
            border:none;
            border-radius:20px;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            background:#ffffff;
            width:100%;
            max-width:450px;
            padding:3rem;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
            border:1px solid #e5e7eb;
        }

        .form-control:focus{
            border-color:#800020;
            box-shadow:0 0 0 4px rgba(128,0,32,0.15);
        }

        .btn-login{
            background:#800020;
            color:#fff;
            border:none;
            border-radius:10px;
            padding:14px;
            width:100%;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#5c0017;
            color:#fff;
            transform:translateY(-2px);
        }

        .text-maroon{
            color:#800020;
        }

    </style>
</head>
<body>

<div class="custom-card">

    <h3 class="text-center fw-bold mb-1 text-maroon">
        Welcome Back
    </h3>

    <p class="text-center text-muted mb-4">
        Sign in to continue
    </p>

    <div id="errorMsg"
         class="alert alert-danger text-center d-none">
    </div>

    <form id="loginForm">

        <div class="mb-3">

            <label class="small fw-bold text-uppercase text-muted">
                Username
            </label>

            <input type="text"
                   id="username"
                   class="form-control"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="mb-4">

            <label class="small fw-bold text-uppercase text-muted">
                Password
            </label>

            <input type="password"
                   id="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>

        </div>

        <button type="submit" class="btn btn-login">
            Sign In
        </button>

        <div class="text-center mt-4">

            <small class="text-muted">

                Don't have an account?

                <a href="register.html"
                   class="text-decoration-none fw-semibold text-maroon">

                    Please Sign Up

                </a>

            </small>

        </div>

    </form>

</div>

<script>

document.getElementById('loginForm').addEventListener('submit', function(e){

    e.preventDefault();

    const username =
    document.getElementById('username').value;

    const password =
    document.getElementById('password').value;

    const savedUser =
    localStorage.getItem('user_' + username);

    const errorMsg =
    document.getElementById('errorMsg');

    if(savedUser){

        const userData = JSON.parse(savedUser);

        if(userData.password === password){

            sessionStorage.setItem(
                'loggedInUser',
                username
            );

            window.location.href = 'dashboard.html';

        }else{

            errorMsg.classList.remove('d-none');

            errorMsg.innerHTML =
            'Invalid password.';

        }

    }else{

        errorMsg.classList.remove('d-none');

        errorMsg.innerHTML =
        'Account not found.';

    }

});

</script>

</body>
</html>
